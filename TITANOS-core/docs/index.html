<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TITANOS Framework</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #05070a;
        color: #f0f4f1;
        margin: 0;
        padding: 40px;
        text-align: center;
      }
      h1 { color: #10b981; }
      .container { max-width: 800px; margin: 0 auto; }
      .video-container {
        margin: 40px 0;
        border: 1px solid rgba(38, 52, 59, 0.5);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }
      img.demo-video {
        width: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>TITANOS Framework</h1>
      <p>An advanced agentic architecture powered by local and cloud reasoning models.</p>
      
      <div class="video-container">
        <!-- We will put the demo webp here -->
        <img src="../assets/demo.webp" alt="Getting Started Demo" class="demo-video" />
      </div>

      <p><a href="https://github.com/titanos-org/titanos" style="color: #06b6d4;">View on GitHub</a></p>
    </div>
  </body>
</html>

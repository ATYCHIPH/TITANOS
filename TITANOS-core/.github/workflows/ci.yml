name: TITANOS CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pip-audit
        python scripts/run.py install
        npm install
        
    - name: Run Security Audits (Node & Python)
      run: |
        pip-audit
        npm audit --audit-level=high || true

    - name: Generate SBOM (Software Bill of Materials)
      run: |
        python -m pip install cyclonedx-bom
        npm install -g @cyclonedx/cyclonedx-npm
        cyclonedx-py pip --output-format json --outfile python-sbom.json || true
        cyclonedx-npm --output-format JSON --output-file node-sbom.json || true

    - name: Upload SBOM Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sbom-${{ matrix.os }}-py${{ matrix.python-version }}
        path: |
          python-sbom.json
          node-sbom.json
        
    - name: Run Build and Tests
      run: |
        python scripts/run.py build

    - name: Run E2E Headless Tests
      run: |
        python scripts/run.py ui-test || true

  manylinux-build:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
    - name: Build manylinux wheel
      run: |
        docker build -t manylinux-builder -f docker/manylinux.Dockerfile .
        docker run --rm -v ${{ github.workspace }}:/io manylinux-builder
    - name: Upload wheel artifacts
      uses: actions/upload-artifact@v4
      with:
        name: manylinux-wheel
        path: dist/*.whl

  publish-pypi:
    runs-on: ubuntu-latest
    needs: [build, manylinux-build]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install twine
      run: pip install twine
    - name: Download wheel artifacts
      uses: actions/download-artifact@v4
      with:
        name: manylinux-wheel
        path: dist/
    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      run: |
        twine upload dist/*
